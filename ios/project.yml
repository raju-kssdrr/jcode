name: JCodeMobile
options:
  bundleIdPrefix: com.jcode
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  JCodeKit:
    path: .

targets:
  JCodeMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources/JCodeMobile
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jcode.mobile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TAS6ARKDN7
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/JCodeMobile/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [armv7]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: "jcode uses the camera to scan QR codes and capture images to send to the AI assistant."
        NSPhotoLibraryUsageDescription: "jcode can attach photos from your library to send to the AI assistant for analysis."
        NSMicrophoneUsageDescription: "jcode uses the microphone for voice dictation to compose messages hands-free."
        NSSpeechRecognitionUsageDescription: "jcode uses speech recognition to transcribe your voice into text messages."
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
    dependencies:
      - package: JCodeKit
        product: JCodeKit
    entitlements:
      path: Sources/JCodeMobile/JCodeMobile.entitlements
      properties: {}
